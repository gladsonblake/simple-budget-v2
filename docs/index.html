<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Budget — Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6366f1;
      --accent-hover: #4f52d8;
      --text: #e2e8f0;
      --muted: #8892a4;
      --win: #0078d4;
      --mac: #555555;
      --linux: #e95420;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .hero {
      text-align: center;
      max-width: 680px;
      width: 100%;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .version-badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .version-badge span {
      color: var(--accent);
      font-weight: 600;
    }

    .platforms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .platform-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .platform-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .platform-icon.win  { background: rgba(0,120,212,0.15); }
    .platform-icon.mac  { background: rgba(85,85,85,0.2); }
    .platform-icon.lnx  { background: rgba(233,84,32,0.15); }

    .platform-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .download-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }

    .dl-btn:hover {
      border-color: var(--accent);
      background: rgba(99,102,241,0.08);
    }

    .dl-label { font-weight: 500; }
    .dl-ext {
      color: var(--muted);
      font-family: monospace;
      font-size: 0.78rem;
    }

    .no-downloads {
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
    }

    .all-releases {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .all-releases:hover { background: rgba(99,102,241,0.1); }

    .loading, .error {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
      font-size: 0.95rem;
    }

    .error { color: #f87171; }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    footer a { color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">💰</div>
    <h1>Simple Budget</h1>
    <p class="subtitle">A straightforward desktop app to track your spending,<br>manage recurring payments, and stay on top of your finances.</p>
    <div id="version-area"></div>
    <div id="downloads-area"><div class="loading">Loading latest release…</div></div>
    <footer>
      <a href="https://github.com/gladsonblake/simple-budget-v2" target="_blank" rel="noopener">View source on GitHub</a>
    </footer>
  </div>

  <script>
    const REPO = 'gladsonblake/simple-budget-v2';
    const API  = `https://api.github.com/repos/${REPO}/releases/latest`;

    const PLATFORM_MAP = [
      {
        key: 'windows',
        name: 'Windows',
        icon: '🪟',
        cls: 'win',
        matchers: [
          { label: 'Installer (MSI)',  ext: '.msi',  test: a => a.name.endsWith('.msi') },
          { label: 'Installer (EXE)',  ext: '.exe',  test: a => a.name.endsWith('.exe') },
        ]
      },
      {
        key: 'mac-arm',
        name: 'macOS (Apple Silicon)',
        icon: '',
        cls: 'mac',
        matchers: [
          { label: 'Disk Image', ext: '.dmg', test: a => a.name.endsWith('.dmg') && a.name.includes('aarch64') },
        ]
      },
      {
        key: 'mac-intel',
        name: 'macOS (Intel)',
        icon: '',
        cls: 'mac',
        matchers: [
          { label: 'Disk Image', ext: '.dmg', test: a => a.name.endsWith('.dmg') && (a.name.includes('x64') || a.name.includes('x86_64')) },
        ]
      },
      {
        key: 'linux',
        name: 'Linux',
        icon: '🐧',
        cls: 'lnx',
        matchers: [
          { label: 'AppImage (portable)', ext: '.AppImage', test: a => a.name.endsWith('.AppImage') },
          { label: 'Debian package',      ext: '.deb',      test: a => a.name.endsWith('.deb') },
        ]
      },
    ];

    async function load() {
      const versionEl   = document.getElementById('version-area');
      const downloadEl  = document.getElementById('downloads-area');

      try {
        const res = await fetch(API, { headers: { Accept: 'application/vnd.github+json' } });
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const release = await res.json();

        versionEl.innerHTML = `<div class="version-badge">Latest release: <span>${release.tag_name}</span></div>`;

        const assets = release.assets || [];

        const cards = PLATFORM_MAP.map(platform => {
          const links = platform.matchers
            .map(m => {
              const asset = assets.find(a => m.test(a));
              return asset
                ? `<a class="dl-btn" href="${asset.browser_download_url}" download>
                     <span class="dl-label">${m.label}</span>
                     <span class="dl-ext">${m.ext}</span>
                   </a>`
                : '';
            })
            .filter(Boolean)
            .join('');

          return `
            <div class="platform-card">
              <div class="platform-header">
                <div class="platform-icon ${platform.cls}">${platform.icon}</div>
                <span class="platform-name">${platform.name}</span>
              </div>
              <div class="download-links">
                ${links || '<span class="no-downloads">No builds available yet</span>'}
              </div>
            </div>`;
        }).join('');

        downloadEl.innerHTML = `
          <div class="platforms">${cards}</div>
          <a class="all-releases" href="https://github.com/${REPO}/releases" target="_blank" rel="noopener">
            All releases &rarr;
          </a>`;
      } catch (err) {
        downloadEl.innerHTML = `
          <div class="error">
            Could not load release data.<br>
            <a class="all-releases" href="https://github.com/${REPO}/releases" target="_blank" rel="noopener">Browse releases on GitHub &rarr;</a>
          </div>`;
        console.error(err);
      }
    }

    load();
  </script>
</body>
</html>
